</style>

<script>
(function() {
  /*
   * Uses SearXNG public instances — open-source meta-search engines
   * that aggregate results from Google, Bing, etc. and return clean JSON.
   * Multiple instances as fallbacks in case one is down.
   */
  var SEARXNG_INSTANCES = [
    'https://search.ononoki.org',
    'https://searx.be',
    'https://search.sapti.me',
    'https://paulgo.io',
    'https://search.bus-hit.me',
    'https://searx.tiekoetter.com'
  ];

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch(e) { return ''; }
  }

  function getTimeAgo(dateStr) {
    if (!dateStr) return '';
    try {
      var date = new Date(dateStr);
      if (isNaN(date.getTime())) return '';
      var seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return 'just now';
      var minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm ago';
      var hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h ago';
      var days = Math.floor(hours / 24);
      return days + 'd ago';
    } catch(e) { return ''; }
  }

  // Strip HTML tags that SearXNG sometimes includes in snippets
  function stripHtml(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function renderResults(items) {
    var feed = document.getElementById('results-feed');
    if (items.length === 0) {
      feed.innerHTML = '<div class="wild-empty">No cuDNN mentions found in the past 24 hours.<br><a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">Try searching Google directly →</a></div>';
      return;
    }
    feed.innerHTML = items.map(function(item) {
      var timeAgo = getTimeAgo(item.publishedDate);
      var engines = item.engines ? item.engines.join(', ') : 'web';
      return '<a class="wild-result" href="' + escapeHtml(item.url) + '" target="_blank">' +
        '<div class="wild-result-title">' + escapeHtml(item.title) + '</div>' +
        '<div class="wild-result-meta">' +
          '<span class="wild-result-source">' + escapeHtml(engines) + '</span>' +
          (timeAgo ? '<span class="wild-result-dot">&middot;</span><span>' + timeAgo + '</span>' : '') +
          (item.domain ? '<span class="wild-result-dot">&middot;</span><span>' + escapeHtml(item.domain) + '</span>' : '') +
        '</div>' +
        (item.snippet ? '<div class="wild-result-snippet">' + escapeHtml(item.snippet) + '</div>' : '') +
        '</a>';
    }).join('');
  }

  async function trySearXNG(instance) {
    var url = instance + '/search?q=cuDNN+OR+cudnn-frontend&format=json&time_range=day&language=en';
    var resp = await fetch(url, {
      headers: { 'Accept': 'application/json' }
    });
    if (!resp.ok) throw new Error('Instance returned ' + resp.status);
    var data = await resp.json();
    if (!data.results || data.results.length === 0) throw new Error('No results');
    return data.results;
  }

  async function loadResults() {
    var feed = document.getElementById('results-feed');
    var btn = document.getElementById('refresh-btn');
    var ts = document.getElementById('last-updated');

    feed.innerHTML = '<div class="wild-loading"><div class="spinner"></div><span>Searching for cuDNN mentions...</span></div>';
    btn.classList.add('loading');

    var results = null;

    // Try each SearXNG instance until one works
    for (var i = 0; i < SEARXNG_INSTANCES.length; i++) {
      try {
        results = await trySearXNG(SEARXNG_INSTANCES[i]);
        break;
      } catch(e) {
        continue;
      }
    }

    if (results && results.length > 0) {
      // Deduplicate by URL
      var seen = {};
      var deduped = [];
      results.forEach(function(r) {
        if (!seen[r.url] && deduped.length < 8) {
          seen[r.url] = true;
          deduped.push({
            title: r.title || 'Untitled',
            url: r.url,
            domain: getDomain(r.url),
            snippet: r.content ? stripHtml(r.content).substring(0, 200) : '',
            publishedDate: r.publishedDate || '',
            engines: r.engines || []
          });
        }
      });
      renderResults(deduped);
    } else {
      feed.innerHTML = '<div class="wild-empty">Could not fetch results from any search provider.<br><a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">View results on Google directly →</a></div>';
    }

    btn.classList.remove('loading');
    ts.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  window.refreshResults = loadResults;
  loadResults();
})();
</script>
