<div class="wild-header">
  <h1>cuDNN in the Wild</h1>
  <p class="wild-subtitle">Recent web mentions of cuDNN from the past 24 hours — fetched live in your browser.</p>
  <div class="wild-controls">
    <button class="wild-refresh" id="refresh-btn" onclick="refreshResults()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
    <span class="wild-timestamp" id="last-updated"></span>
  </div>
</div>

<div class="wild-feed" id="results-feed">
  <div class="wild-loading" id="loading-state">
    <div class="spinner"></div>
    <span>Searching the web for cuDNN mentions...</span>
  </div>
</div>

<div class="wild-footer-link">
  <a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">View full Google search for cuDNN (past 24h) →</a>
</div>

<style>
.wild-header { margin-bottom: 28px; }
.wild-header h1 { margin-bottom: 6px; }
.wild-subtitle { color: #777; font-size: 0.95em; margin: 0 0 16px 0; }

.wild-controls {
  display: flex;
  align-items: center;
  gap: 14px;
}

.wild-refresh {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(118, 185, 0, 0.1);
  border: 1px solid rgba(118, 185, 0, 0.25);
  color: var(--nvidia-green);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 0.82em;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}

.wild-refresh:hover { background: rgba(118, 185, 0, 0.18); }
.wild-refresh.loading svg { animation: spin 0.8s linear infinite; }

.wild-timestamp { color: #555; font-size: 0.78em; }

.wild-feed {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-height: 200px;
}

.wild-result {
  display: block;
  padding: 18px 20px;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.1s;
  border-left: 3px solid transparent;
}

.wild-result:hover {
  background: rgba(118, 185, 0, 0.04);
  border-left-color: var(--nvidia-green);
  text-decoration: none;
}

.wild-result-title {
  color: var(--nvidia-white, #f0f0f0);
  font-size: 0.95em;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 6px;
}

.wild-result:hover .wild-result-title { color: var(--nvidia-green); }

.wild-result-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78em;
  color: #666;
  flex-wrap: wrap;
}

.wild-result-source {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.05);
  padding: 1px 8px;
  border-radius: 3px;
  font-weight: 500;
  color: #888;
}

.wild-result-snippet {
  color: #888;
  font-size: 0.84em;
  margin-top: 6px;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.wild-result-dot { color: #444; }

.wild-empty {
  text-align: center;
  padding: 40px 20px;
  color: #666;
  font-size: 0.9em;
  line-height: 1.6;
}

.wild-empty a { color: var(--nvidia-green); }

.wild-footer-link {
  margin-top: 24px;
  text-align: center;
}

.wild-footer-link a {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 6px;
  background: rgba(118, 185, 0, 0.08);
  color: var(--nvidia-green);
  font-size: 0.85em;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.12s;
}

.wild-footer-link a:hover { background: rgba(118, 185, 0, 0.15); text-decoration: none; }

.wild-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 50px 0;
  color: #666;
  font-size: 0.85em;
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid #333;
  border-top-color: var(--nvidia-green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
(function() {
  var CORS_PROXY = 'https://api.allorigins.win/raw?url=';
  var TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function getTimeAgo(date) {
    var seconds = Math.floor((new Date() - date) / 1000);
    if (seconds < 60) return 'just now';
    var minutes = Math.floor(seconds / 60);
    if (minutes < 60) return minutes + 'm ago';
    var hours = Math.floor(minutes / 60);
    if (hours < 24) return hours + 'h ago';
    var days = Math.floor(hours / 24);
    if (days < 7) return days + 'd ago';
    return date.toLocaleDateString();
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch(e) { return ''; }
  }

  function renderResults(items) {
    var feed = document.getElementById('results-feed');
    if (items.length === 0) {
      feed.innerHTML = '<div class="wild-empty">No cuDNN mentions found in the past 24 hours.<br><a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">Try searching Google directly →</a></div>';
      return;
    }
    feed.innerHTML = items.map(function(item) {
      return '<a class="wild-result" href="' + item.url + '" target="_blank">' +
        '<div class="wild-result-title">' + escapeHtml(item.title) + '</div>' +
        '<div class="wild-result-meta">' +
          '<span class="wild-result-source">' + escapeHtml(item.source) + '</span>' +
          '<span class="wild-result-dot">&middot;</span>' +
          '<span>' + getTimeAgo(item.date) + '</span>' +
          (item.domain ? '<span class="wild-result-dot">&middot;</span><span>' + escapeHtml(item.domain) + '</span>' : '') +
        '</div>' +
        (item.snippet ? '<div class="wild-result-snippet">' + escapeHtml(item.snippet) + '</div>' : '') +
        '</a>';
    }).join('');
  }

  // Google News RSS
  async function fetchGoogleNews() {
    var url = encodeURIComponent('https://news.google.com/rss/search?q=cuDNN+OR+cudnn-frontend&hl=en-US&gl=US&ceid=US:en');
    var resp = await fetch(CORS_PROXY + url);
    if (!resp.ok) throw new Error('fail');
    var text = await resp.text();
    var parser = new DOMParser();
    var xml = parser.parseFromString(text, 'text/xml');
    var items = xml.querySelectorAll('item');
    var results = [];
    var cutoff = Date.now() - TWENTY_FOUR_HOURS;
    for (var i = 0; i < items.length && results.length < 5; i++) {
      var titleEl = items[i].querySelector('title');
      var linkEl = items[i].querySelector('link');
      var pubDateEl = items[i].querySelector('pubDate');
      var descEl = items[i].querySelector('description');
      if (!titleEl || !linkEl) continue;
      var date = pubDateEl ? new Date(pubDateEl.textContent) : new Date();
      if (date.getTime() < cutoff) continue;
      var link = linkEl.textContent || (linkEl.nextSibling ? linkEl.nextSibling.textContent.trim() : '');
      var snippet = '';
      if (descEl) {
        var tmp = document.createElement('div');
        tmp.innerHTML = descEl.textContent;
        snippet = tmp.textContent.substring(0, 200);
      }
      results.push({
        title: titleEl.textContent,
        url: link,
        date: date,
        source: 'Google News',
        domain: getDomain(link),
        snippet: snippet
      });
    }
    return results;
  }

  // Hacker News Algolia API (CORS-friendly, no proxy needed)
  async function fetchHackerNews() {
    var cutoffSeconds = Math.floor((Date.now() - TWENTY_FOUR_HOURS) / 1000);
    var resp = await fetch('https://hn.algolia.com/api/v1/search_by_date?query=cuDNN&tags=(story,comment)&numericFilters=created_at_i>' + cutoffSeconds + '&hitsPerPage=5');
    if (!resp.ok) throw new Error('fail');
    var data = await resp.json();
    return data.hits.map(function(h) {
      return {
        title: h.title || ('Comment by ' + h.author + ' on "' + (h.story_title || 'Hacker News') + '"'),
        url: h.url || ('https://news.ycombinator.com/item?id=' + (h.story_id || h.objectID)),
        date: new Date(h.created_at),
        source: 'Hacker News',
        domain: h.url ? getDomain(h.url) : 'news.ycombinator.com',
        snippet: ''
      };
    });
  }

  // Main: fetch all, merge, sort, render
  async function loadResults() {
    var feed = document.getElementById('results-feed');
    var btn = document.getElementById('refresh-btn');
    var ts = document.getElementById('last-updated');

    feed.innerHTML = '<div class="wild-loading"><div class="spinner"></div><span>Searching the web for cuDNN mentions...</span></div>';
    btn.classList.add('loading');

    var allResults = [];
    var fetches = [
      fetchGoogleNews().catch(function() { return []; }),
      fetchHackerNews().catch(function() { return []; })
    ];
    var results = await Promise.all(fetches);
    results.forEach(function(r) { allResults = allResults.concat(r); });

    // Sort by date descending
    allResults.sort(function(a, b) { return b.date - a.date; });

    // Deduplicate by title similarity
    var seen = {};
    var deduped = [];
    allResults.forEach(function(item) {
      var key = item.title.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 40);
      if (!seen[key]) {
        seen[key] = true;
        deduped.push(item);
      }
    });

    renderResults(deduped.slice(0, 8));
    btn.classList.remove('loading');
    ts.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  window.refreshResults = loadResults;
  loadResults();
})();
</script>
