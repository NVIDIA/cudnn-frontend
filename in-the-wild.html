<script>
(function() {
  // Multiple CORS proxies as fallbacks
  var PROXIES = [
    function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
    function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); },
    function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); }
  ];

  var GOOGLE_URL = 'https://www.google.com/search?q=cuDNN&tbs=qdr:d&num=8&hl=en';

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function getTimeAgo(text) {
    // Google shows relative times like "5 hours ago", pass through
    return text || '';
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch(e) { return ''; }
  }

  function parseGoogleResults(html) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var results = [];

    // Google wraps each result in a div with class "g" or data-sokoban attribute
    // Titles are in h3 tags, links in ancestor <a> tags
    var h3s = doc.querySelectorAll('h3');
    h3s.forEach(function(h3) {
      if (results.length >= 8) return;

      var title = h3.textContent.trim();
      if (!title) return;

      // Walk up to find the parent <a> tag with the actual URL
      var link = h3.closest('a');
      var url = '';
      if (link) {
        var href = link.getAttribute('href') || '';
        // Google uses /url?q=REAL_URL or direct URLs
        var match = href.match(/\/url\?q=(https?:\/\/[^&]+)/);
        if (match) {
          url = decodeURIComponent(match[1]);
        } else if (href.startsWith('http')) {
          url = href;
        }
      }

      if (!url) return;

      // Find snippet — usually a sibling or nearby div with text
      var snippet = '';
      var container = h3.closest('[data-sokoban]') || h3.closest('.g') || h3.parentElement.parentElement.parentElement;
      if (container) {
        // Look for spans that contain substantial text (snippet-like)
        var spans = container.querySelectorAll('span');
        spans.forEach(function(span) {
          var text = span.textContent.trim();
          if (text.length > 60 && text.length < 500 && !snippet) {
            snippet = text;
          }
        });
        // Also try divs with role or style attributes that indicate snippets
        if (!snippet) {
          var divs = container.querySelectorAll('div');
          divs.forEach(function(div) {
            var text = div.textContent.trim();
            if (text.length > 80 && text.length < 400 && text !== title && !snippet) {
              snippet = text;
            }
          });
        }
      }

      // Find date/time info if present
      var timeText = '';
      if (container) {
        var timeMatch = container.textContent.match(/(\d+\s+(?:minute|hour|day|week|month)s?\s+ago)/i);
        if (timeMatch) timeText = timeMatch[1];
      }

      results.push({
        title: title,
        url: url,
        domain: getDomain(url),
        snippet: snippet.substring(0, 200),
        time: timeText
      });
    });

    return results;
  }

  function renderResults(items) {
    var feed = document.getElementById('results-feed');
    if (items.length === 0) {
      feed.innerHTML = '<div class="wild-empty">No cuDNN mentions found in the past 24 hours.<br><a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">Try searching Google directly →</a></div>';
      return;
    }
    feed.innerHTML = items.map(function(item) {
      return '<a class="wild-result" href="' + escapeHtml(item.url) + '" target="_blank">' +
        '<div class="wild-result-title">' + escapeHtml(item.title) + '</div>' +
        '<div class="wild-result-meta">' +
          '<span class="wild-result-source">Google</span>' +
          (item.time ? '<span class="wild-result-dot">&middot;</span><span>' + escapeHtml(item.time) + '</span>' : '') +
          (item.domain ? '<span class="wild-result-dot">&middot;</span><span>' + escapeHtml(item.domain) + '</span>' : '') +
        '</div>' +
        (item.snippet ? '<div class="wild-result-snippet">' + escapeHtml(item.snippet) + '</div>' : '') +
        '</a>';
    }).join('');
  }

  async function tryProxy(proxyFn) {
    var url = proxyFn(GOOGLE_URL);
    var resp = await fetch(url, {
      headers: { 'Accept': 'text/html' }
    });
    if (!resp.ok) throw new Error('Proxy returned ' + resp.status);
    var html = await resp.text();
    if (html.length < 1000) throw new Error('Response too short');
    return html;
  }

  async function loadResults() {
    var feed = document.getElementById('results-feed');
    var btn = document.getElementById('refresh-btn');
    var ts = document.getElementById('last-updated');

    feed.innerHTML = '<div class="wild-loading"><div class="spinner"></div><span>Fetching Google results for cuDNN...</span></div>';
    btn.classList.add('loading');

    var html = null;

    // Try each CORS proxy in order until one works
    for (var i = 0; i < PROXIES.length; i++) {
      try {
        html = await tryProxy(PROXIES[i]);
        break;
      } catch(e) {
        // Try next proxy
        continue;
      }
    }

    if (html) {
      var results = parseGoogleResults(html);
      if (results.length > 0) {
        renderResults(results);
      } else {
        // HTML fetched but parsing found nothing — Google might have changed structure
        feed.innerHTML = '<div class="wild-empty">Fetched Google but could not parse results. Google may have updated their page structure.<br><a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">View results on Google directly →</a></div>';
      }
    } else {
      feed.innerHTML = '<div class="wild-empty">Could not reach Google through any available proxy.<br><a href="https://www.google.com/search?q=cuDNN&tbs=qdr:d" target="_blank">View results on Google directly →</a></div>';
    }

    btn.classList.remove('loading');
    ts.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  window.refreshResults = loadResults;
  loadResults();
})();
</script>
