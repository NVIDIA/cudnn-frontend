---
layout: default
---

<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
      <span class="post-tag">Release</span>
    </div>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
